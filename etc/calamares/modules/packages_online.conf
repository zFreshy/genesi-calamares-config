#
# sets pacman options for package handling.
---

backend: pacman
skip_if_no_internet: false
# NOTE: update_db / update_system below are NOT what fixes the nvidia
# partial-upgrade problem. The CachyOS packages/main.py ignores update_system
# on the netinstall install path -- every call it makes is a bare
# `pacman -S ... --needed`, never -Syu (verified: paste.cachyos.org/p/e20e35d.log,
# 2026-05-31). The real fix is shellprocess@full_upgrade, which runs a true
# `pacman -Syu` in the chroot just before this module so the ISO-pinned nvidia
# stack (nvidia-open-dkms vs nvidia-utils) is already consistent. These flags
# are kept as harmless belt-and-suspenders.
update_db: true
update_system: true

pacman:
    num_retries: 3
    disable_download_timeout: true
    needed_only: true
    # Force overwrite to prevent conflicts with genesi-settings
    overwrite: "*"
