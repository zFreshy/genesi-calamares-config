---
# Genesi OS: auto-detect the GPU and install the matching driver via chwd.
#
# WHY THIS EXISTS
# The live ISO ships nvidia-open (the open kernel modules), which only support
# Turing and newer (RTX 20xx / GTX 16xx / RTX 30xx+). The installed system used
# to get its NVIDIA driver ONLY from the "NVIDIA Drivers" netinstall group,
# which (a) was off by default and (b) hard-listed nvidia-open-dkms — so:
#   * by default NO nvidia driver was installed -> nouveau for everyone;
#   * Pascal (GTX 10xx) / Maxwell (9xx) cards have no nvidia-open support, so
#     even when selected they fell back to nouveau with degraded performance.
#
# chwd (CachyOS hardware detection, installed by pacstrap into the target)
# inspects the REAL PCI hardware — /sys is bind-mounted into the target during
# the install — and installs the correct, version-matched driver profile per
# GPU:
#   Turing+  (RTX 20xx / GTX 16xx / RTX 30xx+) -> nvidia-open-dkms
#   Pascal / Maxwell (GTX 10xx / 9xx)          -> proprietary nvidia (dkms)
#   older NVIDIA (Kepler/Fermi)                -> 470xx / 390xx legacy
#   AMD / Intel                                -> mesa (effectively a no-op)
# Installing the WHOLE profile as one set is exactly why chwd succeeds where the
# old manual netinstall failed: it pulls the driver AND its matching
# nvidia-utils together, instead of requesting one package and letting repo
# priority drag in a mismatched nvidia-utils (the 2026-05-31 abort).
#
# CLI SYNTAX (2026-06-26 fix — this is what broke driver install for EVERYONE)
# The CachyOS chwd was rewritten in Rust and changed its autoconfigure syntax.
# The old Manjaro/mhwd-style "chwd -a pci nonfree 0300" now errors out with
#   "error: unexpected argument 'nonfree' found"
# The current syntax is simply:   chwd -a <classid>   (e.g. chwd -a 0300 = VGA)
# Free/nonfree is no longer a CLI arg: -a picks the highest-PRIORITY profile for
# the device (verified on an RTX 3050: `chwd --list` shows nvidia-open-dkms
# priority 10 vs fallback priority 3, and `chwd -a 0300` selects nvidia-open-dkms).
# This means -a is still generation-aware: Pascal/Maxwell list the proprietary
# nvidia profile as highest priority, so -a installs that instead. As a bonus,
# chwd now also drops in 10-chwd-kms.conf and rebuilds the initramfs with the
# nvidia KMS modules, which is what Wayland/Hyprland needs.
#
# Because the old command ALWAYS failed and the leading "-" (below) swallowed
# the error, every install silently shipped nouveau. Hence: get this syntax right.
#
# dontChroot: false -> runs INSIDE the target chroot, as root, using the
# target's pacman + repos. Placed right after packages@online in the sequence,
# so the network is up and the base system already exists.
#
# NON-ABORTING BY DESIGN
# The command is prefixed with "-", which tells Calamares to IGNORE its exit code
# (see the shellprocess docs: a leading "-" means a failing command does not
# abort the install). So a chwd failure — no network, an unsupported card, a
# transient repo error — can NEVER break the install. Worst case the system boots
# on nouveau (open driver, working display): exactly the previous default. We
# also tee the output to /var/log/genesi-gpu.log inside the target so a silent
# failure is diagnosable post-install instead of vanishing (which is exactly how
# the wrong-syntax bug above stayed hidden for weeks).
#
# chwd drops in 10-chwd-kms.conf and rebuilds the initramfs itself, so the nvidia
# KMS modules are in place for both X11 (Genesi's SDDM default) and Wayland.
dontChroot: false
timeout: 1800
script:
 - "-/bin/sh -c 'chwd -a 0300 2>&1 | tee /var/log/genesi-gpu.log'"
i18n:
 name: "Detecting graphics hardware and installing the matching GPU driver..."
