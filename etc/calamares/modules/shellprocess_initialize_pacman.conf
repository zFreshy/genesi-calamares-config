#
# shellprocess_initialize_pacman.conf
# generate pacman keyring, mirrorlist and copy them into target system
---

dontChroot: true

script:
 - "cp /etc/resolv.conf ${ROOT}/etc/ || true"
 - "cp /etc/resolv.conf /etc/ || true"
 - "ping -c 3 archlinux.org || echo 'Ping failed'"
 - "sed -i '/nl\\.cachyos\\.org/d' /etc/pacman.d/cachyos-mirrorlist || true"
 - "sed -i '/mirror\\.lesviallon\\.fr/d' /etc/pacman.d/cachyos-mirrorlist || true"
 - "sed -i '/nl\\.cachyos\\.org/d' /etc/pacman.d/cachyos-v3-mirrorlist || true"
 - "sed -i '/mirror\\.lesviallon\\.fr/d' /etc/pacman.d/cachyos-v3-mirrorlist || true"
 - "sed -i '/nl\\.cachyos\\.org/d' /etc/pacman.d/cachyos-v4-mirrorlist || true"
 - "sed -i '/mirror\\.lesviallon\\.fr/d' /etc/pacman.d/cachyos-v4-mirrorlist || true"
 - "sed -i '/genesi/d' /etc/pacman.conf || true"
 - "sed -i '/nl\\.cachyos\\.org/d' /etc/pacman.conf || true"
 - "sed -i '/mirror\\.lesviallon\\.fr/d' /etc/pacman.conf || true"
 - "rm -rf /var/lib/pacman/sync/*.db"
 - command: "pacman -Sy --noconfirm archlinux-keyring || true"
   timeout: 1200
 - "chmod +x /etc/calamares/scripts/create-pacman-keyring"
 - command: "bash /etc/calamares/scripts/create-pacman-keyring"
   timeout: 1200
 - command: "bash /etc/calamares/scripts/update-mirrorlist"
   timeout: 1200
 - "mkdir -p ${ROOT}/etc/pacman.d/"
 - "mkdir -p ${ROOT}/etc/"
 - "cp /etc/pacman.conf ${ROOT}/etc/ || true"
 - "sed -i '/genesi/d' /etc/pacman.conf || true"
 - "sed -i '/genesi/d' ${ROOT}/etc/pacman.conf || true"
 - "sed -i '/nl\\.cachyos\\.org/d' /etc/pacman.conf || true"
 - "sed -i '/nl\\.cachyos\\.org/d' ${ROOT}/etc/pacman.conf || true"
 - "sed -i '/mirror\\.lesviallon\\.fr/d' /etc/pacman.conf || true"
 - "sed -i '/mirror\\.lesviallon\\.fr/d' ${ROOT}/etc/pacman.conf || true"
 - "find /etc/pacman.d -type f -exec sed -i '/nl\\.cachyos\\.org/d' {} \\; || true"
 - "find ${ROOT}/etc/pacman.d -type f -exec sed -i '/nl\\.cachyos\\.org/d' {} \\; || true"
 - "sed -i 's|Include = /etc/pacman.d/cachyos-mirrorlist|Server = https://mirror.cachyos.org/repo/\\$arch/\\$repo\\nServer = https://cdn-77.cachyos.org/repo/\\$arch/\\$repo\\nServer = https://build.cachyos.org/repo/\\$arch/\\$repo|g' ${ROOT}/etc/pacman.conf || true"
 - "cp /etc/pacman.d/mirrorlist ${ROOT}/etc/pacman.d/ || true"
 - "touch ${ROOT}/etc/pacman.d/cachyos-mirrorlist"
 - "touch ${ROOT}/etc/pacman.d/cachyos-v3-mirrorlist"
 - "touch ${ROOT}/etc/pacman.d/cachyos-v4-mirrorlist"
 - "touch /etc/pacman.d/cachyos-mirrorlist"
 - "touch /etc/pacman.d/cachyos-v3-mirrorlist"
 - "touch /etc/pacman.d/cachyos-v4-mirrorlist"
 - "printf 'Server = https://mirror.cachyos.org/repo/\\$arch/\\$repo\\n' > /etc/pacman.d/cachyos-mirrorlist"
 - "printf 'Server = https://cdn-77.cachyos.org/repo/\\$arch/\\$repo\\n' >> /etc/pacman.d/cachyos-mirrorlist"
 - "printf 'Server = https://build.cachyos.org/repo/\\$arch/\\$repo\\n' >> /etc/pacman.d/cachyos-mirrorlist"
 - "cp /etc/pacman.d/cachyos-mirrorlist /etc/pacman.d/cachyos-v3-mirrorlist"
 - "cp /etc/pacman.d/cachyos-mirrorlist /etc/pacman.d/cachyos-v4-mirrorlist"
 - "cp /etc/pacman.d/cachyos-mirrorlist ${ROOT}/etc/pacman.d/ || true"
 - "cp /etc/pacman.d/cachyos-v3-mirrorlist ${ROOT}/etc/pacman.d/cachyos-v3-mirrorlist || true"
 - "cp /etc/pacman.d/cachyos-v4-mirrorlist ${ROOT}/etc/pacman.d/cachyos-v4-mirrorlist || true"
 - "cp -a /etc/pacman.d/gnupg ${ROOT}/etc/pacman.d/ || true"
 - "cp /etc/resolv.conf ${ROOT}/etc/ || true"
 - "rm -rf /var/lib/pacman/sync/*.db"

i18n:
 name: "initialize pacman ... ranking mirrors ... copy pacman mirrorlist and keyring to target ..."
