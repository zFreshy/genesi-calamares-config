#
### pacstrap Module
#
# This module installs the base system and then copies files
# into the installation that will be used in the installed system
#

---
# basePackages is an array of package names to pass to pacstrap
#
basePackages:
  - base
  - base-devel
  - linux-cachyos
  - linux-cachyos-headers
  - linux-firmware
  - grub
  - efibootmgr
  - networkmanager
  - sudo
  - nano
  - vim
  # KDE Plasma Desktop (core packages only)
  - plasma-desktop
  - plasma-workspace
  - plasma-nm
  - plasma-pa
  - sddm
  - dolphin
  - konsole
  - kate
  - spectacle
  - breeze-gtk
  - polkit-kde-agent
  # Audio
  - pipewire
  - pipewire-alsa
  - pipewire-jack
  - pipewire-pulse
  - wireplumber
  # Network
  - wpa_supplicant
  # Fonts
  - noto-fonts
  - ttf-dejavu
  # System utilities
  - htop
  - wget
  - curl
  - git
  # File systems
  - btrfs-progs
  - dosfstools
  - ntfs-3g
  # Hardware support
  - intel-ucode
  - amd-ucode
  - mesa
  # VirtualBox guest
  - virtualbox-guest-utils
  # CachyOS specific
  - cachyos-keyring
  - cachyos-mirrorlist

#
# postInstallFiles is an array of file names which will be copied into the system
#
# The paths should be relative to the host and the files will be copied to the
# location in the installed system
#
postInstallFiles:
  - "/etc/pacman.conf"
  - "/etc/default/grub"
  - "/etc/mkinitcpio.conf"
