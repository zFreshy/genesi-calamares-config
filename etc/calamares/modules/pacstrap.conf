#
### pacstrap Module
#
# This module installs the base system and then copies files
# into the installation that will be used in the installed system
#

---
# Additional pacstrap options
# --overwrite '*' forces overwriting of conflicting files
pacstrapOptions: "--overwrite '*'"

# basePackages is an array of package names to pass to pacstrap
#
basePackages:
  - base
  - base-devel
  - linux-cachyos
  - linux-cachyos-headers
  - linux-firmware
  - grub
  - efibootmgr
  - networkmanager
  - sudo
  - nano
  - vim
  # KDE Plasma Desktop (core packages only)
  - plasma-desktop
  - plasma-workspace
  # plasma-x11-session ships /usr/share/xsessions/plasmax11.desktop. In Plasma 6
  # the X11 session is a SEPARATE package: without it the installed system has
  # ONLY the Wayland session, which fails on VirtualBox/VMSVGA (no DRM/GBM/EGL)
  # -> login loops back ("Could not start systemd managed Plasma session:
  # TransactionIsDestructive", 2026-06-05). The live ISO already ships it (that's
  # why the live env logs into X11 fine); the target was missing it. Genesi
  # defaults new users to this X11 session (shellprocess@genesi_session) for
  # broad compatibility; Wayland stays selectable in the SDDM session menu.
  - plasma-x11-session
  - plasma-nm
  - plasma-pa
  - sddm
  - dolphin
  - konsole
  - kate
  - spectacle
  - breeze-gtk
  - polkit-kde-agent
  # Audio
  - pipewire
  - pipewire-alsa
  - pipewire-jack
  - pipewire-pulse
  - wireplumber
  # Network
  - wpa_supplicant
  # Fonts
  - noto-fonts
  - ttf-dejavu
  # System utilities
  - htop
  - wget
  - curl
  - git
  # File systems
  - btrfs-progs
  - dosfstools
  - ntfs-3g
  - xfsprogs
  - e2fsprogs
  - f2fs-tools
  # Hardware support
  - intel-ucode
  - amd-ucode
  - mesa
  # VirtualBox guest
  - virtualbox-guest-utils
  # CachyOS specific
  - cachyos-keyring
  - cachyos-mirrorlist
  # chwd is invoked by the calamares chwd module during install (auto-detects
  # graphics drivers). Must be present in the target chroot or the install
  # aborts with "Failed to run chwd".
  - chwd

#
# postInstallFiles is an array of file names which will be copied into the system
#
# The paths should be relative to the host and the files will be copied to the
# location in the installed system
#
postInstallFiles:
  - "/etc/pacman.conf"
  - "/etc/default/grub"
  - "/etc/mkinitcpio.conf"
  # shellprocess@enable_ufw runs INSIDE the chroot and execs this exact path,
  # so we have to copy it from the live ISO into the target. Without it the
  # install aborts at job 44/46 with exit 127.
  - "/etc/calamares/scripts/enable-ufw"
