#
# handling systemd on target.
---

targets:
   - name: "graphical"
     action: "enable"
     mandatory: false

units:
   - name: "sddm"
     action: "enable"
     mandatory: false

   - name: "NetworkManager"
     action: "enable"
     mandatory: false

   # Required: genesi-settings ships NetworkManager dns.conf with
   # dns=systemd-resolved, which leaves /etc/resolv.conf pointing at the
   # 127.0.0.53 stub. Without this unit enabled the stub has no listener
   # and DNS breaks on first boot (live ISO works because archiso enables
   # systemd-resolved via airootfs/etc/systemd/system/multi-user.target.
   # wants/systemd-resolved.service, but services-systemd does not carry
   # that over to the installed system).
   - name: "systemd-resolved"
     action: "enable"
     mandatory: false

   - name: "cups"
     action: "enable"
     mandatory: false

   - name: "avahi-daemon"
     action: "enable"
     mandatory: false

   - name: "systemd-timesyncd"
     action: "enable"
     mandatory: false

   - name: "systemd-timesyncd"
     action: "enable"
     mandatory: false

   - name: "power-profiles-daemon"
     action: "enable"
     mandatory: false

   - name: "vboxservice"
     action: "enable"
     mandatory: false

   - name: "vmtoolsd"
     action: "enable"
     mandatory: false

   - name: "vmware-vmblock-fuse"
     action: "enable"
     mandatory: false

   - name: "firewalld"
     action: "enable"
     mandatory: false

   - name: "zfs-import-cache"
     action: "enable"
     mandatory: false

   - name: "zfs-mount"
     action: "enable"
     mandatory: false

   - name: "zfs-import.target"
     action: "enable"
     mandatory: false

   - name: "zfs.target"
     action: "enable"
     mandatory: false

   - name: "fstrim"
     action: "enable"
     mandatory: false

   - name:  "pacman-init"
     action: "mask"
     mandatory:  false

   - name: "multi-user.target"
     action: "disable"
     mandatory:  false
