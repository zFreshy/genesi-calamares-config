- name: "Genesi OS"
  description: "Genesi OS essential packages"
  hidden: true
  selected: true
  critical: true
  packages:
     - alacritty
     - btop
     - cachyos-keyring
     - cachyos-mirrorlist
     - cachyos-v3-mirrorlist
     - cachyos-rate-mirrors
     - linux-cachyos
     - linux-cachyos-headers
     - micro
     - nano
     - vim
     # Default interactive shell (Calamares users module sets it as userShell).
     # Needed on EVERY install — incl. KDE-only — or that login shell wouldn't
     # exist. fish gives autosuggestions/completions out of the box (CachyOS-style).
     - fish
     # Own /etc/lsb-release with the distro package. The Calamares branding step
     # (shellprocess@copy_genesi, which runs AFTER packages@online) writes
     # /etc/lsb-release as an UNOWNED file, so later installing anything that
     # depends on lsb-release (steam, proton-cachyos, …) fails with
     #   lsb-release: /etc/lsb-release exists in filesystem  (file conflict).
     # Installing the package here makes pacman own the path; the branding step
     # then only overwrites its CONTENT (no conflict), and the dependency is
     # already satisfied when steam is installed later. Reported 2026-06-22.
     - lsb-release
     - python-pyqt5
     - genesi-settings
     # Genesi-built packages from the [genesi] repo. These are produced by
     # .github/workflows/publish-packages.yml and uploaded to
     # genesi-arch/repo/x86_64. Adding them here is what actually installs
     # the update notifier, welcome app, and AI mode on the target.
     # genesi-desktop is the meta-package that depends on the whole set; it's
     # listed first (and the rest kept explicitly as a safety net) so that new
     # components added to the meta later reach existing systems on `pacman -Syu`.
     - genesi-desktop
     - genesi-update
     - genesi-welcome
     # Genesi package installer (Qt6/Rust app store). Was only in the live ISO
     # list, never here, so installed systems never got it — added so target
     # installs ship it too.
     - genesi-packageinstaller
     - genesi-ai-mode
     # MemPalace integration — local-first long-term memory for the on-device AI
     # (roadmap 2.7). Lightweight (scripts + a per-user indexer service); the
     # mempalace CLI itself is provisioned per-user on demand (uv tool, from
     # PyPI), so this adds negligible install weight.
     - genesi-mempalace
     # llama.cpp (Vulkan) — ships `llama-server`, the backend of Genesi Turbo's
     # ⚡ speculative-decoding switch in the AI Mode Monitor. Optdepend of
     # genesi-ai-mode (not a hard dep — both are built by the same publish
     # pipeline, so a dep would break the build), shipped by default here.
     - genesi-llama-cpp
     - genesi-kde-settings
     - genesi-channel
     # Window decoration (rounded corners) + widget style/glassmorphism +
     # branded GRUB. Built from source by publish-packages.yml. These replace
     # the old "compile on the live ISO, cp into the target" hack
     # (genesi-copy-klassy.sh), which left installed systems with the config
     # pointing at klassy/Darkly but no plugin on disk -> default Breeze look.
     - genesi-klassy
     - genesi-darkly
     - genesi-grub-theme
     # Branded fastfetch greeting (logo + system info) on terminal launch.
     - genesi-fastfetch
     # Genesi look for the GTK desktops (GNOME/Xfce/Cinnamon/MATE): a login-time
     # script that applies wallpaper/theme/accent/launchers. Always-on so every
     # DE install gets it; it no-ops on KDE/Hyprland (which brand themselves).
     - genesi-de-branding
