# NVIDIA / GPU drivers are NO LONGER a fixed netinstall group.
#
# This used to be a "NVIDIA Drivers" group hard-listing nvidia-open-dkms. It was
# off by default (so the installed system got no nvidia driver -> nouveau) and,
# when selected, only worked on Turing+ — Pascal (GTX 10xx) / Maxwell (9xx) need
# the proprietary nvidia driver, which nvidia-open can't provide. Requesting
# nvidia-dkms by hand also broke on the nvidia-utils version pin
# (paste.cachyos.org/p/dd018da.log, 2026-05-31).
#
# The driver is now installed by chwd (CachyOS hardware detection) via
# shellprocess@genesi_gpu in settings.conf, which detects the real GPU and pulls
# the correct, version-matched profile (nvidia-open for Turing+, proprietary
# nvidia for Pascal/Maxwell, legacy 470xx/390xx for older, mesa for AMD/Intel).
# That covers every GPU automatically and can't conflict with a fixed group.
