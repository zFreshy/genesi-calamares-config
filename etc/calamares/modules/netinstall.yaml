# DE groups MUST be `hidden: false` + `selected: false` for the desktop chooser
# to work. WHY hidden:false: the packagechooser (method: netinstall-select) makes
# its pick install by force-SELECTING the matching group via
# NetInstallPage::onActivate -> PackageModel::updateSelections, which walks ONLY
# the visible tree (m_rootItem). A `hidden: true` group is NOT appended to that
# tree — PackageModel::setupModelData puts it in a separate m_hiddenItems list
# (PackageModel.cpp ~L437) whose install is governed by its OWN selected flag
# (hiddenSelected()), untouched by the chooser. So with hidden:true, picking
# "Hyprland + caelestia-shell" force-selected nothing and Hyprland never
# installed, while KDE still came in — the bug reproduced on every build through
# 2026-06-17. CachyOS ships its DE groups hidden:false for exactly this reason;
# it also gives the wanted UX (the DE groups show as checkboxes on the Packages
# page, pre-checked to match the Desktop step). WHY selected:false: the chooser
# only force-SELECTS its pick and unselects the previous one; it never unselects
# a group that is `selected: true` on its own, so a true here would install KDE
# regardless. `default: KDE-Desktop` keeps Plasma the default pick.
