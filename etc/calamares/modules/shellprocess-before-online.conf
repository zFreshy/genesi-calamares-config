---
# Genesi OS: prepares the target chroot before the online packages stage.
# Runs INSIDE the target chroot (dontChroot: false) after pacstrap.
#
# Each command is prefixed with '-' so a failure here is non-fatal: if
# pacstrap leaves the target in an unexpected state we want to keep going
# instead of aborting the whole install with a cryptic chroot error.
dontChroot: false
timeout: 900
script:
    - "-rm ${ROOT}/etc/calamares/scripts/try-v3"
    - "-pacman-key --init"
    - "-pacman-key --populate archlinux cachyos"
    - "-sed -i 's/SigLevel.*/SigLevel = Never/g' /etc/pacman.conf"
    - "-pacman -Sy"
