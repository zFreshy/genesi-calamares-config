---
# Runs on the LIVE ISO (dontChroot: true).
# Guarantees [genesi] repo is available and pre-installs genesi-settings
# with --overwrite to prevent conflicts during packages@online.
dontChroot: true
timeout: 600
script:
    - "-grep -q '^\\[genesi\\]' /etc/pacman.conf || printf '\\n[genesi]\\nSigLevel = Optional TrustAll\\nServer = https://raw.githubusercontent.com/zFreshy/GenesiOS/main/genesi-arch/repo/x86_64\\n' >> /etc/pacman.conf"
    - "-pacman -Sy --noconfirm 2>&1 || true"
    - "-pacman --root ${ROOT} --config /etc/pacman.conf -Sy --noconfirm 2>&1 || true"
    - "-pacman --root ${ROOT} --config /etc/pacman.conf -S --noconfirm --overwrite='*' genesi-settings 2>&1 || true"
i18n:
    name: "Preparing Genesi OS configuration..."
