---
# Runs on the LIVE ISO (dontChroot: true), AFTER pacstrap, BEFORE packages@online.
#
# packages@online runs `pacman -S` INSIDE the target chroot, so it reads the
# TARGET's /etc/pacman.conf (not the live ISO's). If [genesi] is missing
# there, pacman fails with "target not found: genesi-settings" and the
# install aborts (paste.cachyos.org/p/60bad6b.log, 2026-05-19).
#
# genesi-prepare-pacman.sh staged the live's pacman.conf into the target
# before pacstrap, but [genesi] is only added here (after pacstrap). So we
# inject [genesi] into BOTH files now and refresh the target's pacman DB
# so packages@online can resolve genesi-* targets.
dontChroot: true
timeout: 120
script:
    - "-grep -q '^\\[genesi\\]' /etc/pacman.conf || printf '\\n[genesi]\\nSigLevel = Optional TrustAll\\nServer = https://raw.githubusercontent.com/zFreshy/GenesiOS/main/genesi-arch/repo/x86_64\\n' >> /etc/pacman.conf"
    - "-grep -q '^\\[genesi\\]' @@ROOT@@/etc/pacman.conf || printf '\\n[genesi]\\nSigLevel = Optional TrustAll\\nServer = https://raw.githubusercontent.com/zFreshy/GenesiOS/main/genesi-arch/repo/x86_64\\n' >> @@ROOT@@/etc/pacman.conf"
    - "-pacman -Sy --noconfirm"
    - "-pacman --root @@ROOT@@ --config @@ROOT@@/etc/pacman.conf -Sy --noconfirm"
i18n:
    name: "Preparing Genesi OS repository..."
