---
# Genesi OS: set the created user's default desktop session to match the DE the
# user picked in the packagechooser (Plasma X11 by default, or Hyprland on a
# Hyprland-only install). Roadmap 5.1 multi-DE support.
#
# The actual logic lives in an external script because Calamares interprets every
# $foo / ${foo} inside an inline `command:` as a Calamares-side substitution and
# aborts on unknown names ("Missing variables"). The script owns all shell
# variables; Calamares only sets $ROOT (the target rootMountPoint) in its
# environment and never inspects it. See scripts/genesi-set-session.sh for the
# detection + per-user AccountsService writes and the rationale.
#
# dontChroot: true -> runs on the live ISO against $ROOT=/mnt (same model as
# shellprocess@copy_genesi), which is required because the script file only
# exists on the live ISO, not in the target. Must run AFTER the users module so
# /home/<user> exists.
dontChroot: true
timeout: 30
script:
 - "bash /etc/calamares/scripts/genesi-set-session.sh"
i18n:
 name: "Setting the default desktop session..."
