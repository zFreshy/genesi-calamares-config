---
# Genesi OS: default the created user's desktop session to Plasma X11.
#
# WHY: Plasma 6 defaults to a Wayland session, which needs working DRM/GBM/EGL.
# VirtualBox/VMSVGA (and some NVIDIA setups) don't provide that, so the Wayland
# session crashes the moment you log in and SDDM bounces you back to the greeter
# ("Could not start systemd managed Plasma session: TransactionIsDestructive" /
# "Could not start Plasma session", reproduced in a VBox VM 2026-06-05). X11
# Plasma runs everywhere (it's what the live ISO autologins into), so we make it
# the default for the installed system. Wayland stays available in the SDDM
# session menu for users on capable hardware who want it.
#
# HOW: SDDM honours the freedesktop AccountsService per-user default session.
# Writing XSession=plasmax11 to /var/lib/AccountsService/users/<user> makes that
# user log into the X11 session by default. Requires plasma-x11-session (added
# to pacstrap basePackages) so /usr/share/xsessions/plasmax11.desktop exists.
#
# dontChroot: false -> runs in the target; ${USER} is substituted by Calamares
# with the account created on the users page. Commands use only plain echo (no
# shell variables, no escape sequences) to stay clear of Calamares' variable
# substitution. Every line ends in "|| true" so a hiccup never aborts the
# install.
dontChroot: false
timeout: 30
script:
 - "mkdir -p /var/lib/AccountsService/users || true"
 - "echo '[User]' > /var/lib/AccountsService/users/${USER} || true"
 - "echo 'Session=plasmax11.desktop' >> /var/lib/AccountsService/users/${USER} || true"
 - "echo 'XSession=plasmax11' >> /var/lib/AccountsService/users/${USER} || true"
 - "echo 'SystemAccount=false' >> /var/lib/AccountsService/users/${USER} || true"
i18n:
 name: "Setting Plasma X11 as the default session..."
