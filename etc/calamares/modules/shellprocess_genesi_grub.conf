#
# shellprocess_genesi_grub.conf
# Genesi OS: authoritative GRUB finalization. Runs LAST (after bootloader +
# grubcfg) so it can rewrite /etc/default/grub deterministically and
# regenerate grub.cfg in the target chroot. All logic lives in the external
# script so Calamares never tries to interpret $-variables as its own
# substitutions. Best-effort: never aborts the install.
---
dontChroot: true
timeout: 600

script:
 - command: "bash /etc/calamares/scripts/genesi-grub-setup.sh"
   timeout: 600
   verbose: true

i18n:
 name: "Finalizing Genesi OS boot menu..."
 name[pt_BR]: "Finalizando o menu de inicialização do Genesi OS..."
