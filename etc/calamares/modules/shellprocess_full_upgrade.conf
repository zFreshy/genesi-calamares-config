#
# shellprocess_full_upgrade.conf
# Genesi OS: full system upgrade of the TARGET, chrooted, right before
# packages@online.
#
# WHY THIS EXISTS
# ---------------
# pacstrap installs a base whose nvidia stack (nvidia-open-dkms) is pinned to
# the EXACT nvidia-utils version that existed when the ISO was built
# (e.g. nvidia-utils=610.43.02). The before-online step then runs
# `pacman --root ${ROOT} -Sy`, syncing the target DB to the CURRENT CachyOS
# repo. By the time packages@online runs `pacman -S --needed <netinstall>`
# (which includes a NEWER nvidia-utils), that is a PARTIAL UPGRADE: the new
# nvidia-utils breaks the installed nvidia-open-dkms pin and pacman aborts
# with "could not satisfy dependencies / unable to satisfy 'nvidia-utils=...'"
# (paste.cachyos.org/p/e20e35d.log, 2026-05-31, job 22/44).
#
# packages_online.conf sets update_system: true to mitigate this, but the
# CachyOS packages/main.py IGNORES it on the netinstall install path -- the
# log shows every pacman call is a bare `pacman -S ... --needed`, never -Syu.
#
# Fix: do a REAL `pacman -Syu` in the chroot first, so nvidia-open-dkms and
# nvidia-utils (and everything else) move to the current repo versions in
# lockstep. The pins then match and packages@online's targeted -S is a no-op
# for the nvidia stack. Running chrooted (dontChroot: false) means dkms /
# mkinitcpio hooks execute in the proper target environment.
---

dontChroot: false
timeout: 1800
script:
    - command: |
        # Stale lock from any earlier killed pacman would block -Syu.
        rm -f /var/lib/pacman/db.lck
        for attempt in 1 2 3; do
            echo "==> Genesi: full system upgrade (attempt ${attempt}/3)"
            if pacman -Syu --noconfirm --overwrite='*' \
                     --noprogressbar --disable-download-timeout; then
                echo "==> Genesi: full upgrade OK"
                exit 0
            fi
            echo "==> Genesi: upgrade attempt ${attempt} failed, retrying..."
            rm -f /var/lib/pacman/db.lck
        done
        # Non-fatal: let packages@online still try. If the conflict persists
        # it will surface there with the same pacman diagnostics.
        echo "==> Genesi: full upgrade did not complete; continuing anyway"
        exit 0

i18n:
    name: "Upgrading the system before installing packages..."
    name[pt_BR]: "Atualizando o sistema antes de instalar os pacotes..."
