#
# Create, overwrite or update /etc/default/grub in the target system.
#
# Write lines to /etc/default/grub (in the target system) based
# on calculated values and the values set in the *defaults* key
# in this configuration file.
#
# Calculated values are:
#   - GRUB_DISTRIBUTOR,   branding module, *bootloaderEntryName* (this
#     string is sanitized, and see also setting *keep_distributor*)
#   - GRUB_ENABLE_CRYPTODISK, based on the presence of filesystems
#     that use LUKS
#   - GRUB_CMDLINE_LINUX_DEFAULT, adding LUKS setup and plymouth
#     support to the kernel.

---
overwrite: false

prefer_grub_d: false

keep_distributor: false

kernel_params: [ "quiet" ]

defaults:
    GRUB_TIMEOUT: 5
    GRUB_DEFAULT: "saved"
    GRUB_DISABLE_SUBMENU: true
    GRUB_TERMINAL_OUTPUT: "gfxterm"
    GRUB_GFXMODE: "1920x1080,1024x768,auto"
    GRUB_GFXPAYLOAD_LINUX: "keep"
    GRUB_DISABLE_RECOVERY: true
    # NOTE: GRUB_THEME removed. It pointed at /usr/share/grub/themes/cachyos/
    # theme.txt, which is installed nowhere in the build -> GRUB fell back to a
    # plain black menu. Genesi instead uses GRUB_BACKGROUND + GRUB_COLOR_*,
    # which the shellprocess@genesi_grub step writes authoritatively and then
    # regenerates grub.cfg. See scripts/genesi-grub-setup.sh.
    GRUB_DISTRIBUTOR: "Genesi OS"
